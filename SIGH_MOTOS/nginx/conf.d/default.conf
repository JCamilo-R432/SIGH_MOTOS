# ════════════════════════════════════════════════════════════════════════════
#  SIGC-Motos v2.0 — Nginx (HTTP → HTTPS redirect + API proxy + SPA)
#
#  Fase 1: Certificado autofirmado desde ./ssl/ (acceso por IP)
#  Fase 2: Cambiar ssl_certificate a /etc/letsencrypt/live/<dominio>/...
#          y server_name a motos.quantacloud.co cuando el DNS esté listo.
# ════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    # Challenge Let's Encrypt (útil cuando el dominio esté activo)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name _;

    # ── Certificados (autofirmados en Fase 1) ────────────────────────────────
    ssl_certificate     /etc/ssl/nginx/server.crt;
    ssl_certificate_key /etc/ssl/nginx/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;

    # ── API → Backend Node.js ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
        proxy_cache_bypass $http_upgrade;

        client_max_body_size 10M;
        proxy_read_timeout   60s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
    }

    # ── Archivos subidos (uploads) ────────────────────────────────────────────
    location /uploads/ {
        alias /app/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Assets estáticos ─────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Frontend React SPA ────────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Seguridad ─────────────────────────────────────────────────────────────
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer-when-downgrade;

    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;
    gzip_min_length 1000;
}
