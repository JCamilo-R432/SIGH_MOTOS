# ════════════════════════════════════════════════════════════════════════════
#  SIGC-Motos v2.0 — Nginx (HTTP → HTTPS redirect + API proxy + SPA)
#  Dominio: motos.quantacloud.co
# ════════════════════════════════════════════════════════════════════════════

# Redirigir HTTP → HTTPS (también sirve el challenge de Let's Encrypt)
server {
    listen 80;
    server_name motos.quantacloud.co www.motos.quantacloud.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name motos.quantacloud.co www.motos.quantacloud.co;

    # ── Certificados Let's Encrypt ───────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/motos.quantacloud.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/motos.quantacloud.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── API → Backend Node.js ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        client_max_body_size 10M;
        proxy_read_timeout   60s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
    }

    # ── Archivos subidos (uploads) ────────────────────────────────────────────
    location /uploads/ {
        alias /app/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Assets estáticos (js, css, imágenes, fuentes) ────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Frontend React SPA (client-side routing) ──────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Seguridad ─────────────────────────────────────────────────────────────
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer-when-downgrade;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;
    gzip_min_length 1000;
}
